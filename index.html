<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Saturn Heart Sphere with 10 Floating Photos</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020205; }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,105,180,0.9);
            font-family: 'Segoe UI', sans-serif;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,105,180,0.5);
        }
    </style>
</head>
<body>

<div id="ui">geser dan zoom</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 12); // Sudut pandang agak ke atas agar terlihat horizontal

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // --- Textures ---
    const textureLoader = new THREE.TextureLoader();
    
    // Tekstur Partikel Bulat Lembut (Sprite)
    const sprite = textureLoader.load('https://threejs.org/examples/textures/sprites/disc.png');

    // --- MEMUAT FOTO (OPSI B - HAPUS KOMENTAR UNTUK MENGGUNAKAN FOTO ASLI) ---
    
    const photoFiles = [
        'Fonts/1.jpg', 'Fonts/2.jpg', 'Fonts/3.jpg', 
        'Fonts/4.jpg', 'Fonts/5.jpg', 'Fonts/6.jpg', 
        'Fonts/7.jpg', 'Fonts/8.jpg', 'Fonts/9.jpg', 
        'Fonts/10.jpg'
    ];
    const photoTextures = photoFiles.map(file => textureLoader.load(file));
    

    const mainGroup = new THREE.Group();
    scene.add(mainGroup);

    // --- A. BOLA PARTIKEL LUAR (DREAMY) ---
    const sphereGeo = new THREE.BufferGeometry();
    const spherePos = [];
    const sphereCols = [];
    const sphereCount = 4000;
    const colorPink = new THREE.Color("#ff69b4");
    const colorPurple = new THREE.Color("#9370db");

    for (let i = 0; i < sphereCount; i++) {
        const phi = Math.acos(-1 + (2 * i) / sphereCount);
        const theta = Math.sqrt(sphereCount * Math.PI) * phi;
        spherePos.push(5 * Math.cos(theta) * Math.sin(phi), 5 * Math.sin(theta) * Math.sin(phi), 5 * Math.cos(phi));
        
        const mixedColor = Math.random() > 0.4 ? colorPink.clone() : colorPurple.clone();
        mixedColor.lerp(new THREE.Color("#ffffff"), Math.random() * 0.2);
        sphereCols.push(mixedColor.r, mixedColor.g, mixedColor.b);
    }
    sphereGeo.setAttribute('position', new THREE.Float32BufferAttribute(spherePos, 3));
    sphereGeo.setAttribute('color', new THREE.Float32BufferAttribute(sphereCols, 3));
    const sphereMat = new THREE.PointsMaterial({
        size: 0.04, map: sprite, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, opacity: 0.6, depthWrite: false
    });
    mainGroup.add(new THREE.Points(sphereGeo, sphereMat));

    // --- B. CINCIN SATURNUS HORIZONTAL (TERANG) ---
    const ringGeo = new THREE.BufferGeometry();
    const ringPos = [];
    const ringCount = 8000; // Lebih padat agar lebih terang
    for (let i = 0; i < ringCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 6.5 + Math.random() * 2.0; // Jarak cincin
        // Y diatur sangat kecil agar horizontal datar
        ringPos.push(Math.cos(angle) * radius, (Math.random() - 0.5) * 0.15, Math.sin(angle) * radius);
    }
    ringGeo.setAttribute('position', new THREE.Float32BufferAttribute(ringPos, 3));
    const ringMat = new THREE.PointsMaterial({
        size: 0.08, map: sprite, transparent: true, blending: THREE.AdditiveBlending, color: 0xff1493, opacity: 0.9, depthWrite: false
    });
    const ring = new THREE.Points(ringGeo, ringMat);
    // Cincin tidak perlu dimiringkan, sudah horizontal secara default
    mainGroup.add(ring);

    // --- C. HATI DI DALAM ---
    const heartGeo = new THREE.BufferGeometry();
    const heartPos = [];
    for (let i = 0; i < 1500; i++) {
        const t = Math.random() * Math.PI * 2;
        const v = Math.random() * Math.PI;
        const x = 16 * Math.pow(Math.sin(t), 3) * Math.sin(v);
        const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * Math.sin(v);
        const z = -10 * Math.cos(v);
        heartPos.push(x * 0.1, y * 0.1, z * 0.1);
    }
    heartGeo.setAttribute('position', new THREE.Float32BufferAttribute(heartPos, 3));
    const heartMat = new THREE.PointsMaterial({
        size: 0.1, map: sprite, transparent: true, blending: THREE.AdditiveBlending, color: 0xff0055, depthWrite: false
    });
    const heart = new THREE.Points(heartGeo, heartMat);
    mainGroup.add(heart);

    // --- D. 10 FOTO MENGAMBANG (DENGAN ANIMASI) ---
    const photosGroup = new THREE.Group();
    mainGroup.add(photosGroup);

    const photoGeometry = new THREE.PlaneGeometry(1.2, 1.2);
    const photos = [];
    const photoCount = 10;

    for (let i = 0; i < photoCount; i++) {
        // --- OPSI A (DEFAULT) - PLACEHOLDER PUTIH BERSINAR ---
        const photoMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffffff,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.8
        });

        // --- OPSI B - HAPUS KOMENTAR JIKA MENGGUNAKAN FOTO ASLI ---
        
        const photoMaterial = new THREE.MeshBasicMaterial({ 
            map: photoTextures[i % photoTextures.length], 
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.9
        });
        

        const photoMesh = new THREE.Mesh(photoGeometry, photoMaterial);
        
        // Posisi awal acak di dalam bola, mengelilingi hati
        photoMesh.position.set(
            (Math.random() - 0.5) * 4,
            (Math.random() - 0.5) * 4,
            (Math.random() - 0.5) * 4
        );
        
        // Simpan data untuk animasi unik per foto
        photoMesh.userData = {
            velocity: new THREE.Vector3((Math.random() - 0.5) * 0.01, (Math.random() - 0.5) * 0.01, (Math.random() - 0.5) * 0.01),
            rotSpeed: (Math.random() - 0.5) * 0.02,
            floatOffset: Math.random() * Math.PI * 2
        };

        photos.push(photoMesh);
        photosGroup.add(photoMesh);
    }

    // --- Post-Processing (Glow / Bloom) ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    // Strength 1.5, Radius 0.4, Threshold 0.1 untuk pendaran yang kuat
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.1);
    composer.addPass(bloomPass);

    // --- Animasi Loop ---
    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();

        // Rotasi otomatis lambat seluruh sistem
        mainGroup.rotation.y = time * 0.15; 
        
        // Efek denyut jantung
        heart.scale.setScalar(1 + Math.sin(time * 2) * 0.1);
        
        // Animasi Cincin (Sedikit goyangan horizontal agar dinamis)
        ring.rotation.y = time * 0.05;

        // Animasi 10 Foto Mengambang
        photos.forEach((photo, index) => {
            // Bergerak perlahan berdasarkan kecepatan acak
            photo.position.add(photo.userData.velocity);
            
            // Berputar perlahan
            photo.rotation.y += photo.userData.rotSpeed;
            photo.rotation.x += photo.userData.rotSpeed * 0.5;

            // Mengambang naik-turun tambahan (sinus)
            photo.position.y += Math.sin(time + photo.userData.floatOffset) * 0.005;

            // Jaga agar foto tetap di dalam bola (memantul jika keluar radius 3.5)
            if (photo.position.length() > 3.8) {
                photo.userData.velocity.negate();
            }
        });

        controls.update();
        composer.render();
    }

    // Handle Resize Jendela
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
